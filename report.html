<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน - รายงานการเข้างาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; background-color: #f1f3f5; } </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📊 ระบบจัดการบุคลากร (HR Dashboard)</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">กลับไปหน้าลงเวลา</a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-primary">📋 รายงานประวัติการลงเวลา (Real-time)</h5>
                <span class="badge bg-success" id="connectionStatus">กำลังเชื่อมต่อ...</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped text-center align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ชื่อพนักงาน</th>
                                <th>สถานะ</th>
                                <th>เวลาที่บันทึก</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="3" class="text-muted py-4">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // นำเข้าเครื่องมือดึงข้อมูลแบบ Real-time (onSnapshot) และตัวจัดเรียง (orderBy)
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ---------------------------------------------------------
        // 🚨 สำคัญมาก: เอา firebaseConfig ของคุณมาวางทับตรงนี้ให้เหมือนหน้า index.html
        // ---------------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
  authDomain: "time-tracker-46283.firebaseapp.com",
  projectId: "time-tracker-46283",
  storageBucket: "time-tracker-46283.firebasestorage.app",
  messagingSenderId: "882533547295",
  appId: "1:882533547295:web:4b78bfc84322c58a50042a",
  measurementId: "G-5DPBNCSWFW"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ดึงข้อมูลจากคอลเลกชัน 'attendance_records' และเรียงลำดับจากล่าสุดไปเก่าสุด
        const q = query(collection(db, "attendance_records"), orderBy("timestamp", "desc"));
        const tableBody = document.getElementById('tableBody');
        const statusBadge = document.getElementById('connectionStatus');

        // ฟังก์ชัน onSnapshot จะคอยเฝ้าดูฐานข้อมูลตลอดเวลา ถ้ามีใครกดปุ่ม มันจะดึงข้อมูลใหม่มาโชว์ทันที
        onSnapshot(q, (snapshot) => {
            statusBadge.innerHTML = "🟢 เชื่อมต่อสำเร็จ (Real-time)";
            tableBody.innerHTML = ""; // ล้างคำว่า 'กำลังโหลดข้อมูล...' ออก

            if (snapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3' class='text-muted py-4'>ยังไม่มีข้อมูลการลงเวลา</td></tr>";
                return;
            }

            // วนลูปเอาข้อมูลแต่ละแถวมาสร้างเป็นตาราง
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // ตกแต่งป้ายสีตามสถานะ เข้า/ออก
                let actionBadge = "";
                if(data.action === "เข้างาน") {
                    actionBadge = `<span class="badge bg-success px-3 py-2">เข้างาน</span>`;
                } else {
                    actionBadge = `<span class="badge bg-danger px-3 py-2">ออกงาน</span>`;
                }

                // สร้างโค้ด HTML ตารางแทรกเข้าไป
                const row = `
                    <tr>
                        <td class="fw-bold">${data.emp_name}</td>
                        <td>${actionBadge}</td>
                        <td class="text-muted">${data.record_time}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }, (error) => {
            console.error("Error fetching real-time data: ", error);
            statusBadge.innerHTML = "🔴 เชื่อมต่อล้มเหลว";
            statusBadge.classList.replace("bg-success", "bg-danger");
        });
    </script>
</body>
</html>
