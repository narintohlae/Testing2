<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน - รายงานการเข้างาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Prompt', sans-serif; background-color: #f1f3f5; } 
        .table-container { background: white; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📊 ระบบจัดการบุคลากร (HR Dashboard)</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">กลับไปหน้าลงเวลา</a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-primary fw-bold">📋 รายงานประวัติการลงเวลา (Real-time)</h5>
                <div>
                    <button onclick="exportToCSV()" class="btn btn-outline-success btn-sm me-2 fw-bold">📥 ดาวน์โหลด Excel (CSV)</button>
                    <span class="badge bg-success" id="connectionStatus">กำลังเชื่อมต่อ...</span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped text-center align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ชื่อพนักงาน</th>
                                <th>การกระทำ</th>
                                <th>เวลาที่บันทึก</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="3" class="text-muted py-4">กำลังโหลดข้อมูลจาก Firebase...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. นำเข้าเครื่องมือจาก Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ---------------------------------------------------------
        // 🚨 สำคัญ: นำกุญแจ Firebase ของคุณมาวางทับที่นี่
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "ใส่ของคุณ",
            authDomain: "ใส่ของคุณ",
            projectId: "ใส่ของคุณ",
            storageBucket: "ใส่ของคุณ",
            messagingSenderId: "ใส่ของคุณ",
            appId: "ใส่ของคุณ"
        };

        // 2. เริ่มต้นการเชื่อมต่อ
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tableBody = document.getElementById('tableBody');
        const statusBadge = document.getElementById('connectionStatus');
        let allRecords = []; // ตัวแปรเก็บข้อมูลสำหรับใช้ Export CSV

        // 3. ฟังก์ชันดึงข้อมูลแบบ Real-time
        const q = query(collection(db, "attendance_records"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            statusBadge.innerHTML = "🟢 เชื่อมต่อสำเร็จ (Real-time)";
            tableBody.innerHTML = ""; 
            allRecords = []; // ล้างข้อมูลเก่าก่อนเก็บใหม่

            if (snapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3' class='text-muted py-4'>ยังไม่มีข้อมูลในระบบ</td></tr>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                allRecords.push(data); // เก็บลงตัวแปร global เพื่อใช้ตอนโหลด CSV

                // ตกแต่งป้ายสีสถานะ
                const badgeClass = data.action === "เข้างาน" ? "bg-success" : "bg-danger";
                
                const row = `
                    <tr>
                        <td class="fw-bold text-dark">${data.emp_name}</td>
                        <td><span class="badge ${badgeClass} px-3 py-2">${data.action}</span></td>
                        <td class="text-secondary">${data.record_time}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }, (error) => {
            console.error(error);
            statusBadge.innerHTML = "🔴 เชื่อมต่อล้มเหลว";
            statusBadge.classList.replace("bg-success", "bg-danger");
        });

        // 4. ฟังก์ชันสำหรับดาวน์โหลดไฟล์ CSV
        window.exportToCSV = function() {
            if (allRecords.length === 0) {
                alert("ยังไม่มีข้อมูลให้ดาวน์โหลดครับ");
                return;
            }

            // ใส่ \uFEFF (BOM) เพื่อให้ Excel เปิดไฟล์แล้วอ่านภาษาไทยออก (ไม่เป็นต่างดาว)
            let csvContent = "\uFEFF"; 
            csvContent += "ชื่อพนักงาน,สถานะ,เวลาที่บันทึก\n";

            allRecords.forEach(row => {
                csvContent += `${row.emp_name},${row.action},${row.record_time}\n`;
            });

            // สร้างลิงก์ดาวน์โหลด
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "ประวัติการลงเวลา.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
