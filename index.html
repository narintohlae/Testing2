<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TimeTrack - 2026 Practical UI</title>
    <style>
        /* --- 2026 Practical Design System --- */
        :root {
            /* Color Palette (High Contrast, Clean) */
            --bg-body: #e4e4e7;
            --bg-app: #f4f4f5;
            --bg-card: #ffffff;
            --bg-input: #f4f4f5;
            
            --text-main: #09090b;
            --text-sec: #52525b;
            --text-ter: #a1a1aa;
            
            --border-light: #e4e4e7;
            --border-dark: #d4d4d8;
            
            /* Semantic Colors (Solid, No Gradients for Professional Look) */
            --accent: #09090b; /* Black as primary accent */
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            
            /* Geometry */
            --rad-sm: 12px;
            --rad-md: 16px;
            --rad-lg: 24px;
            --rad-pill: 99px;
            
            /* Shadows (Very subtle, mostly flat design) */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-up: 0 -4px 20px rgba(0,0,0,0.03);
        }

        /* --- Base & Reset --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh;
            overflow: hidden; touch-action: manipulation;
        }

        /* --- App Container (Mobile Simulator) --- */
        #app {
            width: 100%; max-width: 430px; height: 100%; max-height: 932px; /* iPhone 15 Pro Max size */
            background-color: var(--bg-app); position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-radius: 40px;
        }
        @media (max-width: 430px) { #app { border-radius: 0; box-shadow: none; } }

        /* --- Layout System (Absolute Separation) --- */
        header {
            flex: 0 0 auto; padding: 1.5rem 1.5rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-app); z-index: 10;
        }
        
        main {
            flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
            padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }
        
        #action-zone {
            flex: 0 0 auto; background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            border-radius: 32px 32px 0 0; box-shadow: var(--shadow-up);
            padding: 1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom));
            z-index: 40; display: flex; flex-direction: column; gap: 1rem;
        }

        /* --- Typography & Branding --- */
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px; }
        .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
        
        .role-tag { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: var(--rad-pill); text-transform: uppercase; letter-spacing: 0.5px; }
        .role-admin { background: #e0e7ff; color: #4f46e5; }
        .role-emp { background: #dcfce7; color: #059669; }

        .title { font-size: 1.25rem; font-weight: 700; margin: 0 0 1rem 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.85rem; color: var(--text-sec); margin-top: -0.75rem; margin-bottom: 1.5rem; }

        .time-display { font-size: clamp(4rem, 15vw, 5rem); font-weight: 800; letter-spacing: -3px; line-height: 1; text-align: center; margin: 1rem 0 0; }
        .date-display { font-size: 1rem; font-weight: 600; color: var(--text-sec); text-align: center; margin-top: 0.5rem; }

        /* --- UI Components --- */
        .card { background: var(--bg-card); border-radius: var(--rad-lg); padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border-light); }
        .card-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .card-stat { flex: 1; background: var(--bg-card); border-radius: var(--rad-lg); padding: 1.25rem; border: 1px solid var(--border-light); display: flex; flex-direction: column; justify-content: center; }
        
        /* Forms */
        .input-group { margin-bottom: 1rem; }
        .input-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-sec); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-el { width: 100%; padding: 1rem 1.2rem; background: var(--bg-input); border: 1px solid transparent; border-radius: var(--rad-md); font-size: 1rem; font-weight: 500; color: var(--text-main); font-family: inherit; transition: 0.2s; }
        .input-el:focus { border-color: var(--accent); background: var(--bg-card); outline: none; }
        textarea.input-el { resize: vertical; min-height: 80px; }

        /* Buttons */
        .btn { width: 100%; padding: 1.2rem; border-radius: var(--rad-md); font-size: 1.05rem; font-weight: 700; border: none; cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; border: 2px solid var(--border-dark); color: var(--text-main); }
        .btn-ghost { background: transparent; color: var(--text-sec); padding: 0.8rem; font-size: 0.9rem; }
        .btn-ghost:active { background: var(--bg-input); }

        /* Lists */
        .list-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
        .list-item { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--rad-md); padding: 1rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .item-col { display: flex; flex-direction: column; gap: 4px; }
        .item-head { font-weight: 600; font-size: 0.95rem; }
        .item-sub { font-size: 0.8rem; color: var(--text-sec); font-weight: 500; }

        /* Status Badges */
        .badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
        .bg-in { background: #dcfce7; color: #059669; }
        .bg-out { background: #f1f5f9; color: #475569; }
        .bg-pend { background: #fef3c7; color: #d97706; }
        .bg-appr { background: #dcfce7; color: #059669; }
        .bg-rej { background: #ffe4e6; color: #e11d48; }

        /* --- 2026 Smart Numpad --- */
        .numpad-area { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .pin-display { display: flex; gap: 1rem; margin-bottom: 1.5rem; height: 16px; align-items: center; }
        .pin-dot { width: 12px; height: 12px; border-radius: 12px; background: var(--border-dark); transition: 0.2s ease-out; }
        .pin-dot.filled { width: 24px; background: var(--accent); }
        .pin-dot.error { background: var(--danger); width: 12px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .shake { animation: shake 0.3s ease-in-out; }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; width: 100%; max-width: 320px; }
        .num-key { background: var(--bg-input); border: none; border-radius: var(--rad-md); aspect-ratio: 1.3/1; font-size: 1.75rem; font-weight: 600; color: var(--text-main); cursor: pointer; transition: 0.1s; user-select: none; }
        .num-key:active { background: var(--border-dark); transform: scale(0.92); }
        .num-key.action { font-size: 1.2rem; font-weight: 700; color: var(--text-sec); background: transparent; }

        /* --- Bottom Navigation (Admin Only) --- */
        #bottom-nav {
            display: flex; background: var(--bg-card); border-top: 1px solid var(--border-light);
            padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom)); z-index: 50;
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0.5rem 0; color: var(--text-ter); font-size: 0.65rem; font-weight: 700; cursor: pointer; transition: 0.2s; border-radius: var(--rad-md); }
        .nav-tab svg { width: 24px; height: 24px; stroke-width: 2px; }
        .nav-tab.active { color: var(--accent); }

        /* Helpers */
        .hide { display: none !important; }
        .empty { text-align: center; padding: 2rem; color: var(--text-ter); font-weight: 500; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="app">
        <!-- HEADER -->
        <header>
            <div class="brand"><div class="brand-dot"></div>TimeTrack</div>
            <div class="header-actions">
                <div id="role-badge"></div>
                <button class="btn-logout hide" id="btn-logout" onclick="logout()">ออกระบบ</button>
            </div>
        </header>

        <!-- MAIN SCROLLABLE CONTENT -->
        <main id="main-view"></main>

        <!-- FIXED THUMB ACTION ZONE -->
        <div id="action-zone" class="hide"></div>

        <!-- ADMIN BOTTOM NAV -->
        <nav id="bottom-nav" class="hide"></nav>
    </div>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Global State ---
        let records = [], employees = [], requests = [], adminPin = null;
        let currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || null;
        let isReady = false, loaded = { emp: false, rec: false, sys: false, req: false };
        let clockInterval;
        let currentPin = "";
        let pendingAction = null; // 'setup' | null

        // --- DOM Elements ---
        const vMain = document.getElementById('main-view');
        const vAction = document.getElementById('action-zone');
        const vNav = document.getElementById('bottom-nav');
        const eRole = document.getElementById('role-badge');
        const eLogout = document.getElementById('btn-logout');

        // --- Initialization ---
        vMain.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text-ter);">กำลังเชื่อมต่อ...</div>';
        
        signInAnonymously(auth).then(() => {
            onSnapshot(collection(db, "employees"), (s) => { employees = s.docs.map(d => ({id: d.id, ...d.data()})); loaded.emp = true; checkReady(); });
            onSnapshot(collection(db, "timeRecords"), (s) => { records = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)); loaded.rec = true; checkReady(); });
            onSnapshot(collection(db, "system"), (s) => { const ad = s.docs.find(d => d.id === 'settings'); adminPin = ad ? ad.data().adminPin : null; loaded.sys = true; checkReady(); });
            onSnapshot(collection(db, "requests"), (s) => { requests = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)); loaded.req = true; checkReady(); });
        }).catch(() => { vMain.innerHTML = '<div class="empty" style="color:var(--danger);">เชื่อมต่อล้มเหลว กรุณาตรวจสอบอินเทอร์เน็ต</div>'; });

        function checkReady() {
            if (loaded.emp && loaded.rec && loaded.sys && loaded.req) {
                isReady = true; updateLayout(); route();
            }
        }

        // --- Utility ---
        function getEmpStatus(empId) {
            const empRecs = records.filter(r => r.empId === empId);
            return empRecs.length === 0 ? 'OUT' : empRecs[empRecs.length - 1].type;
        }

        function startClock() {
            clearInterval(clockInterval);
            const tick = () => {
                const now = new Date();
                const elTime = document.getElementById('clock-time');
                const elDate = document.getElementById('clock-date');
                if(elTime) elTime.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                if(elDate) elDate.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'short' });
            };
            tick(); clockInterval = setInterval(tick, 1000);
        }

        function formatStatus(status) {
            if(status === 'PENDING') return '<span class="badge bg-pend">รอพิจารณา</span>';
            if(status === 'APPROVED') return '<span class="badge bg-appr">อนุมัติ</span>';
            return '<span class="badge bg-rej">ปฏิเสธ</span>';
        }

        // --- Core UI Logic ---
        function updateLayout() {
            if (!currentUser) {
                eRole.innerHTML = ''; eLogout.classList.add('hide'); vNav.classList.add('hide'); vAction.classList.remove('hide');
            } else if (currentUser.role === 'admin') {
                eRole.innerHTML = '<span class="role-tag role-admin">Admin</span>'; eLogout.classList.remove('hide');
                vNav.classList.remove('hide'); vAction.classList.add('hide'); // Admin mostly uses lists/forms in main view
                vNav.innerHTML = `
                    <div class="nav-tab" onclick="nav('ad-dash')" id="tab-ad-dash"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>แดชบอร์ด</div>
                    <div class="nav-tab" onclick="nav('ad-emp')" id="tab-ad-emp"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>ทีมงาน</div>
                    <div class="nav-tab" onclick="nav('ad-req')" id="tab-ad-req"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>คำขอ</div>
                `;
            } else {
                eRole.innerHTML = '<span class="role-tag role-emp">Staff</span>'; eLogout.classList.remove('hide');
                vNav.classList.remove('hide'); vAction.classList.add('hide'); // Emp uses action zone contextually
                vNav.innerHTML = `
                    <div class="nav-tab" onclick="nav('em-dash')" id="tab-em-dash"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>ลงเวลา</div>
                    <div class="nav-tab" onclick="nav('em-req')" id="tab-em-req"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>คำขอลางาน</div>
                `;
            }
        }

        // --- Numpad System (Smart Entry) ---
        window.typePin = function(val) {
            if (val === 'C') currentPin = "";
            else if (val === '<') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += val;
            
            drawPinDots();
            if (currentPin.length === 4) setTimeout(() => processPin(), 100);
        };

        function drawPinDots() {
            const wrap = document.getElementById('pin-wrap');
            if(!wrap) return;
            wrap.innerHTML = Array.from({length:4}).map((_,i) => `<div class="pin-dot ${i<currentPin.length?'filled':''} ${currentPin==='err'?'error':''}"></div>`).join('');
        }

        function processPin() {
            if (pendingAction === 'setup') {
                setDoc(doc(db, "system", "settings"), { adminPin: currentPin });
                adminPin = currentPin; nav('login'); return;
            }
            
            if (currentPin === adminPin) {
                currentUser = { role: 'admin' }; sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateLayout(); nav('ad-dash');
            } else {
                const emp = employees.find(e => e.pin === currentPin);
                if (emp) {
                    currentUser = { role: 'emp', id: emp.id, name: emp.name };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateLayout(); nav('em-dash');
                } else {
                    currentPin = 'err'; drawPinDots(); document.getElementById('pin-wrap').classList.add('shake');
                    setTimeout(() => { document.getElementById('pin-wrap').classList.remove('shake'); currentPin = ""; drawPinDots(); }, 300);
                }
            }
        }

        function renderNumpad() {
            return `
                <div class="numpad-area">
                    <div class="pin-display" id="pin-wrap">
                        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                    </div>
                    <div class="numpad-grid">
                        ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="num-key" onclick="typePin('${n}')">${n}</button>`).join('')}
                        <button class="num-key action" onclick="typePin('C')">ล้าง</button>
                        <button class="num-key" onclick="typePin('0')">0</button>
                        <button class="num-key action" onclick="typePin('<')">ลบ</button>
                    </div>
                </div>
            `;
        }

        // --- VIEWS: UNAUTHENTICATED ---
        function viewSetup() {
            pendingAction = 'setup'; currentPin = "";
            vMain.innerHTML = `
                <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <h1 class="title">ตั้งค่าเริ่มต้น</h1>
                    <p class="subtitle">กำหนดรหัส PIN 4 หลักสำหรับเจ้าของร้าน</p>
                </div>
            `;
            vAction.innerHTML = renderNumpad();
        }

        function viewLogin() {
            pendingAction = null; currentPin = "";
            vMain.innerHTML = `
                <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <div class="time-display" id="clock-time">00:00</div>
                    <div class="date-display" id="clock-date">--</div>
                    <p style="margin-top:2rem; font-weight:600; color:var(--text-sec);">เข้าสู่ระบบ / ลงเวลา</p>
                </div>
            `;
            vAction.innerHTML = renderNumpad();
            startClock();
        }

        // --- VIEWS: EMPLOYEE ---
        function viewEmpDash() {
            vAction.classList.remove('hide');
            const status = getEmpStatus(currentUser.id);
            const isIn = status === 'IN';
            
            const btnHtml = isIn 
                ? `<button class="btn btn-danger" onclick="doPunch('OUT')">ลงเวลาออกงาน</button>`
                : `<button class="btn btn-success" onclick="doPunch('IN')">ลงเวลาเข้างาน</button>`;

            const myRecs = records.filter(r => r.empId === currentUser.id).reverse().slice(0, 5);
            let recsHtml = myRecs.length ? myRecs.map(r => `
                <div class="list-item">
                    <div class="item-col">
                        <span class="item-head">${r.dateString}</span>
                        <span class="item-sub">${r.timeString}</span>
                    </div>
                    <span class="badge ${r.type==='IN'?'bg-in':'bg-out'}">${r.type==='IN'?'เข้างาน':'ออกงาน'}</span>
                </div>
            `).join('') : '<div class="empty">ยังไม่มีประวัติ</div>';

            vMain.innerHTML = `
                <div style="padding: 1rem 0;">
                    <h2 class="title" style="font-size:1.5rem;">สวัสดี, ${currentUser.name}</h2>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:0.85rem; font-weight:600; color:var(--text-sec);">สถานะปัจจุบัน:</span>
                        <span class="badge ${isIn?'bg-in':'bg-out'}">${isIn?'กำลังทำงาน':'ยังไม่เข้างาน'}</span>
                    </div>
                </div>
                <div class="title" style="margin-top:1.5rem; font-size:1rem;">ประวัติล่าสุด</div>
                <div class="list-wrap" style="padding-bottom:120px;">${recsHtml}</div>
            `;

            vAction.innerHTML = btnHtml;
        }

        window.doPunch = async function(type) {
            vAction.innerHTML = `<button class="btn" style="background:var(--bg-input); color:var(--text-sec);" disabled>กำลังบันทึก...</button>`;
            const now = new Date();
            await addDoc(collection(db, "timeRecords"), {
                empId: currentUser.id, empName: currentUser.name, type: type,
                timestamp: now.toISOString(),
                timeString: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                dateString: now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
            });
            // Update UI automatically via listener
        };

        function viewEmpReq() {
            vAction.classList.add('hide'); // ซ่อน Thumb Zone ให้ใช้ฟอร์มแบบเลื่อนได้
            const myReqs = requests.filter(r => r.empId === currentUser.id);
            let listHtml = myReqs.length ? myReqs.map(r => `
                <div class="list-item">
                    <div class="item-col">
                        <span class="item-head">${r.reqType==='LEAVE' ? r.leaveType : 'สลับวันหยุด'}</span>
                        <span class="item-sub">วันที่: ${r.date}</span>
                    </div>
                    ${formatStatus(r.status)}
                </div>
            `).join('') : '<div class="empty">ไม่มีประวัติคำขอ</div>';

            let empOpts = employees.filter(e => e.id !== currentUser.id).map(e => `<option value="${e.id}">${e.name}</option>`).join('');

            vMain.innerHTML = `
                <h2 class="title" style="margin-top:1rem;">ส่งคำขอใหม่</h2>
                
                <div class="card" style="padding:1rem;">
                    <div class="input-group">
                        <span class="input-label">ประเภทคำขอ</span>
                        <select id="reqSelect" class="input-el" onchange="toggleReqForm(this.value)">
                            <option value="LEAVE">ลางาน</option>
                            <option value="SWAP">สลับวันหยุด</option>
                        </select>
                    </div>

                    <div id="form-leave">
                        <div class="input-group">
                            <select id="f-lType" class="input-el"><option value="ลาป่วย">ลาป่วย</option><option value="ลากิจ">ลากิจ</option><option value="พักร้อน">พักร้อน</option></select>
                        </div>
                        <div class="input-group"><input type="date" id="f-lDate" class="input-el"></div>
                        <div class="input-group"><input type="text" id="f-lNote" class="input-el" placeholder="เหตุผลการลา"></div>
                        <button class="btn btn-primary" onclick="submitReq('LEAVE')">ส่งคำขอลางาน</button>
                    </div>

                    <div id="form-swap" class="hide">
                        <div class="input-group">
                            <span class="input-label">สลับวันหยุดกับ</span>
                            <select id="f-sEmp" class="input-el"><option value="" disabled selected>เลือกเพื่อนร่วมงาน</option>${empOpts}</select>
                        </div>
                        <div class="input-group">
                            <span class="input-label">วันที่ต้องการให้มาแทน</span>
                            <input type="date" id="f-sDate" class="input-el">
                        </div>
                        <button class="btn btn-primary" onclick="submitReq('SWAP')">ส่งคำขอสลับวัน</button>
                    </div>
                </div>

                <h2 class="title" style="margin-top:1rem; font-size:1rem;">ประวัติคำขอ</h2>
                <div class="list-wrap">${listHtml}</div>
            `;
        }

        window.toggleReqForm = function(type) {
            document.getElementById('form-leave').classList.toggle('hide', type !== 'LEAVE');
            document.getElementById('form-swap').classList.toggle('hide', type !== 'SWAP');
        }

        window.submitReq = async function(type) {
            const now = new Date().toISOString();
            if(type === 'LEAVE') {
                const lt = document.getElementById('f-lType').value, ld = document.getElementById('f-lDate').value, ln = document.getElementById('f-lNote').value;
                if(!ld) return alert('กรุณาเลือกวันที่');
                await addDoc(collection(db, "requests"), { empId: currentUser.id, empName: currentUser.name, reqType: 'LEAVE', leaveType: lt, date: ld, reason: ln, status: 'PENDING', timestamp: now });
            } else {
                const tid = document.getElementById('f-sEmp').value, sd = document.getElementById('f-sDate').value;
                if(!tid || !sd) return alert('กรุณากรอกให้ครบ');
                const tName = employees.find(e=>e.id===tid).name;
                await addDoc(collection(db, "requests"), { empId: currentUser.id, empName: currentUser.name, reqType: 'SWAP', targetEmpId: tid, targetEmpName: tName, date: sd, status: 'PENDING', timestamp: now });
            }
            alert('ส่งคำขอเรียบร้อย');
        }

        // --- VIEWS: ADMIN ---
        function viewAdDash() {
            vAction.classList.add('hide');
            const workCount = employees.filter(e => getEmpStatus(e.id) === 'IN').length;
            const pendCount = requests.filter(r => r.status === 'PENDING').length;
            
            let recsHtml = records.slice(-5).reverse().map(r => `
                <div class="list-item">
                    <div class="item-col"><span class="item-head">${r.empName}</span><span class="item-sub">${r.dateString} ${r.timeString}</span></div>
                    <span class="badge ${r.type==='IN'?'bg-in':'bg-out'}">${r.type==='IN'?'เข้า':'ออก'}</span>
                </div>
            `).join('');

            vMain.innerHTML = `
                <h2 class="title" style="margin-top:1rem;">ภาพรวมวันนี้</h2>
                <div class="card-row">
                    <div class="card-stat">
                        <div style="font-size:2rem; font-weight:800; line-height:1;">${employees.length}</div>
                        <div style="font-size:0.8rem; color:var(--text-sec); font-weight:600; margin-top:4px;">พนักงานรวม</div>
                    </div>
                    <div class="card-stat">
                        <div style="font-size:2rem; font-weight:800; color:var(--success); line-height:1;">${workCount}</div>
                        <div style="font-size:0.8rem; color:var(--text-sec); font-weight:600; margin-top:4px;">กำลังทำงาน</div>
                    </div>
                </div>
                
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:1rem 1.25rem;" onclick="nav('ad-req')">
                    <div class="item-col">
                        <span class="item-head">คำขอรอดำเนินการ</span>
                        <span class="item-sub">แตะเพื่อจัดการ</span>
                    </div>
                    <div style="background:#fef3c7; color:#d97706; font-weight:800; padding:4px 12px; border-radius:12px;">${pendCount} รายการ</div>
                </div>

                <h2 class="title" style="font-size:1rem; margin-top:1rem;">ความเคลื่อนไหวล่าสุด</h2>
                <div class="list-wrap">${recsHtml || '<div class="empty">ไม่มีความเคลื่อนไหว</div>'}</div>
            `;
        }

        function viewAdEmp() {
            vAction.classList.add('hide');
            let empHtml = employees.map(e => `
                <div class="list-item">
                    <div class="item-col"><span class="item-head">${e.name}</span><span class="item-sub">PIN: ${e.pin}</span></div>
                    <button class="btn-ghost" style="color:var(--danger); font-weight:700;" onclick="delEmp('${e.id}')">ลบ</button>
                </div>
            `).join('');

            vMain.innerHTML = `
                <h2 class="title" style="margin-top:1rem;">เพิ่มพนักงาน</h2>
                <div class="card" style="padding:1rem;">
                    <div class="card-row" style="margin-bottom:0.75rem;">
                        <input type="text" id="a-eName" class="input-el" style="flex:2;" placeholder="ชื่อพนักงาน">
                        <input type="password" id="a-ePin" class="input-el" style="flex:1; text-align:center;" placeholder="PIN" maxlength="4" inputmode="numeric">
                    </div>
                    <button class="btn btn-primary" onclick="addEmp()">บันทึกข้อมูล</button>
                </div>
                <h2 class="title" style="font-size:1rem; margin-top:1rem;">รายชื่อพนักงาน</h2>
                <div class="list-wrap">${empHtml || '<div class="empty">ไม่มีข้อมูลพนักงาน</div>'}</div>
            `;
        }

        window.addEmp = async function() {
            const n = document.getElementById('a-eName').value.trim(), p = document.getElementById('a-ePin').value;
            if(!n || p.length !== 4) return alert('กรุณากรอกชื่อ และ PIN 4 หลัก');
            if(p === adminPin || employees.some(e=>e.pin===p)) return alert('PIN ซ้ำในระบบ');
            await addDoc(collection(db, "employees"), { name: n, pin: p });
            alert('เพิ่มสำเร็จ');
        }
        window.delEmp = async function(id) { if(confirm('ยืนยันลบพนักงาน?')) await deleteDoc(doc(db, "employees", id)); }

        function viewAdReq() {
            vAction.classList.add('hide');
            let reqHtml = requests.map(r => `
                <div class="card" style="padding:1rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <div class="item-col">
                            <span class="item-head">${r.empName}</span>
                            <span class="item-sub" style="color:var(--text-main); font-weight:600;">
                                ${r.reqType==='LEAVE' ? `ลา: ${r.leaveType} (${r.date})` : `สลับกับ: ${r.targetEmpName} (${r.date})`}
                            </span>
                            ${r.reason ? `<span class="item-sub" style="font-style:italic;">"${r.reason}"</span>` : ''}
                        </div>
                        ${formatStatus(r.status)}
                    </div>
                    ${r.status === 'PENDING' ? `
                    <div class="card-row" style="margin-bottom:0;">
                        <button class="btn btn-outline" style="border-color:var(--danger); color:var(--danger);" onclick="updReq('${r.id}', 'REJECTED')">ปฏิเสธ</button>
                        <button class="btn btn-primary" onclick="updReq('${r.id}', 'APPROVED')">อนุมัติ</button>
                    </div>` : ''}
                </div>
            `).join('');

            vMain.innerHTML = `
                <h2 class="title" style="margin-top:1rem;">จัดการคำขอ</h2>
                <div class="list-wrap">${reqHtml || '<div class="empty">ไม่มีคำขอในระบบ</div>'}</div>
            `;
        }
        window.updReq = async function(id, status) { await updateDoc(doc(db, "requests", id), {status: status}); }

        window.logout = function() {
            sessionStorage.removeItem('currentUser'); currentUser = null;
            updateLayout(); nav('login');
        };

        // --- Router ---
        window.nav = function(page) {
            if (!adminPin && page !== 'setup') page = 'setup';
            else if (adminPin && !currentUser && page !== 'login') page = 'login';
            
            // Role Guard
            if (currentUser) {
                if (currentUser.role === 'admin' && page.startsWith('em-')) page = 'ad-dash';
                if (currentUser.role === 'emp' && page.startsWith('ad-')) page = 'em-dash';
            }

            // Update Tabs
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            const tab = document.getElementById(`tab-${page}`);
            if(tab) tab.classList.add('active');

            window.location.hash = page;
            vMain.scrollTop = 0;

            if (page === 'setup') viewSetup();
            else if (page === 'login') viewLogin();
            else if (page === 'ad-dash') viewAdDash();
            else if (page === 'ad-emp') viewAdEmp();
            else if (page === 'ad-req') viewAdReq();
            else if (page === 'em-dash') viewEmpDash();
            else if (page === 'em-req') viewEmpReq();
        };

        function route() {
            if(!isReady) return;
            let page = window.location.hash.replace('#', '') || (adminPin ? (currentUser ? (currentUser.role==='admin'?'ad-dash':'em-dash') : 'login') : 'setup');
            nav(page);
        }
        window.addEventListener('hashchange', route);

    </script>
</body>
</html>
